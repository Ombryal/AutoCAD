<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan2CAD | Image to DWG Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            Plan2CAD AI
        </h1>
        <p class="text-slate-400 mt-2">Convert floor plan images to layered DXF/DWG files</p>
    </header>

    <main class="w-full max-w-xl bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl">
        <div id="drop-zone" class="border-2 border-dashed border-slate-600 rounded-xl p-10 text-center hover:border-blue-500 transition-colors cursor-pointer">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div class="space-y-4">
                <div class="text-5xl">📄</div>
                <p id="file-name" class="text-slate-300">Drag & drop your floor plan or click to browse</p>
            </div>
        </div>

        <button id="convert-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed">
            Generate CAD File
        </button>

        <div id="status-container" class="hidden mt-8 space-y-4">
            <div class="flex justify-between text-sm mb-1">
                <span id="status-text">Analyzing image...</span>
                <span id="status-percent">0%</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-2">
                <div id="progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p class="text-xs text-slate-500 italic text-center">Note: Complex plans may take longer to vectorize.</p>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
